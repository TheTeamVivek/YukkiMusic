rtmp_dm_only: |
  🔒 <b>تنبيه أمني</b>
  
  يجب عدم مشاركة بيانات RTMP في المجموعات أبداً!
  
  <b>📩 لتهيئة RTMP:</b>
  1. افتح محادثتي الخاصة: @{bot_username}
  2. أرسل: <code>{cmd} &lt;chat_id&gt; &lt;rtmp_url&gt;</code>
  
  <b>💡 مثال:</b>
  <code>/setrtmp -1001234567890 rtmps://server/s/key</code>

rtmp_setup_usage: |
  ⚙️ <b>تهيئة RTMP</b>
  
  <u>الاستخدام:</u>
  <code>/setrtmp &lt;chat_id&gt; &lt;full_rtmp_url&gt;</code>
  
  <b>📋 المعايير:</b>
  • <code>chat_id</code> - معرف المحادثة/القناة المستهدفة
  • <code>full_rtmp_url</code> - رابط RTMP الكامل مع مفتاح البث
  
  <b>📝 مثال:</b>
  <code>/setrtmp -1001234567890 rtmps://dc5-1.rtmp.t.me/s/123:key</code>
  
  <b>🔍 كيفية الحصول على معرف المحادثة:</b>
  • قم بتوجيه أي رسالة من المحادثة إلى @userinfobot
  • أو استخدم أمر <code>/id</code> في المحادثة
  
  <b>🔐 الأمان:</b>
  • التهيئة تعمل فقط في الخاص (المحادثة السرية)
  • يجب أن تكون مشرفاً في المحادثة المستهدفة
  • تُخزن البيانات بشكل آمن

rtmp_invalid_chat_id: |
  ❌ <b>معرف محادثة غير صالح!</b>
  
  يرجى تقديم معرف محادثة رقمي صحيح.
  
  <b>💡 مثال:</b>
  <code>/setrtmp -1001234567890 rtmps://...</code>

rtmp_check_admin_failed: |
  ❌ <b>فشل التحقق من حالة الإشراف:</b>
  <code>{error}</code>
  
  <b>⚠️ تأكد من:</b>
  • أنني مشرف في المحادثة المستهدفة
  • أن معرف المحادثة صحيح
  • أنك تملك صلاحيات المشرف

rtmp_not_admin: |
  ⚠️ <b>تم رفض الإذن</b>
  
  يجب أن تكون <b>مشرفاً</b> في المحادثة المستهدفة لتهيئة RTMP.

rtmp_parse_failed: |
  ❌ <b>فشل تحليل رابط RTMP:</b>
  <code>{error}</code>
  
  <b>📋 التنسيق الصحيح:</b>
  <code>rtmp://server/app/streamkey</code>
  أو
  <code>rtmps://server/s/streamkey</code>

rtmp_streaming_not_supported: |
  ⚠️ <b>البث غير مدعوم</b>
  
  هذا الإجراء غير متاح أثناء استخدام <b>وضع RTMP</b>.
  
  استخدم <code>/stream</code> لتشغيل الوسائط عبر RTMP.
  
rtmp_configured_success: |
  ✅ <b>تمت تهيئة RTMP بنجاح!</b>
  
  <b>🆔 معرف المحادثة:</b> <code>{chat_id}</code>
  <b>🔗 الرابط:</b> <code>{url}</code>
  <b>🔑 المفتاح:</b> <code>{key}</code>
  
  <b>✨ الخطوات التالية:</b>
  اذهب إلى محادثتك واستخدم:
  <code>/stream &lt;song name&gt;</code>
  
  <b>🔒 ملاحظة أمنية:</b>
  تُخزن البيانات بشكل آمن ولا تُعرض أبداً في المجموعة.


