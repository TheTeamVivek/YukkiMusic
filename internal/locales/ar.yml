# Commands help
help_owner: |
  👑 <b>أوامر المالك</b>

  <i>أدوات حصرية لإدارة المساعدين وتنفيذ أوامر النظام وإدارة المساعد الآلي بشكل آمن.</i>

  <b>الأوامر:</b>
  <blockquote>
  <b>/addsudo</b> - إضافة مستخدم جديد لقائمة المساعدين
  <b>/delsudo</b> - إزالة مستخدم من قائمة المساعدين
  <b>/eval</b> - تنفيذ شيفرات Go
  <b>/maintenance</b> — إدارة وضع الصيانة
  <b>/restart</b> — إعادة تشغيل المساعد الآلي
  <b>/sh</b> - تشغيل أوامر القشرة (Shell)
  </blockquote>

help_sudo: |
  ⚡ <b>أوامر المساعدين</b>

  <i>أدوات متقدمة لإدارة سلوك المساعد ومراقبة الأداء والتحكم في السجلات والأتمتة.</i>

  <b>الأوامر:</b>
  <blockquote>
  <b>/active</b> - عرض المحادثات النشطة
  <b>/autoleave</b> - تبديل المغادرة التلقائية
  <b>/logger</b> - تفعيل أو تعطيل السجل
  <b>/stats</b> - عرض إحصائيات النظام والمساعد
  <b>/logs</b> - الحصول على سجلات النظام
  </blockquote>

help_admin: |
  🛠 <b>أوامر المشرفين</b>

  <i>أدوات التحكم في الموسيقى والتشغيل للمشرفين للتحكم في التشغيل بسهولة.</i>

  <b>الأوامر:</b>
  <blockquote>
  <b>/playmode</b> - التحكم في من يمكنه استخدام /play
  <b>/cmddelete</b> - تبديل الحذف التلقائي لأوامر البوت
  <b>/speed</b> - تغيير سرعة التشغيل
  <b>/skip</b> - تخطي الأغنية الحالية
  <b>/pause</b> - إيقاف التشغيل مؤقتاً
  <b>/resume</b> - استئناف التشغيل المتوقف مؤقتاً
  <b>/replay</b> - إعادة تشغيل الأغنية الحالية
  <b>/mute</b> - كتم الصوت
  <b>/unmute</b> - إلغاء كتم الصوت
  <b>/seek</b> - تقديم التشغيل بضع ثوانٍ
  <b>/seekback</b> - إرجاع التشغيل بضع ثوانٍ
  <b>/jump</b> - القفز إلى وقت محدد في المقطع
  <b>/move</b> - نقل مقطع منتظر إلى مركز آخر
  <b>/clear</b> - إزالة جميع الأغاني من قائمة الانتظار
  <b>/remove</b> - إزالة مقطع محدد من قائمة الانتظار
  <b>/shuffle</b> - ترتيب عشوائي لقائمة الانتظار
  <b>/loop</b> - تفعيل أو تعطيل التكرار
  <b>/stop</b> - إيقاف التشغيل ومغادرة المحادثة الصوتية
  <b>/nothumb</b> - تفعيل أو تعطيل الغلاف في رسائل التشغيل
  </blockquote>
  
help_public: |
  🌍 <b>الأوامر العامة</b>

  <i>ميزات لتشغيل الأغاني وعرض قوائم الانتظار والتحقق من التأخير والإبلاغ عن الأخطاء.</i>

  <b>الأوامر:</b>
  <blockquote>
  <b>/play</b> - تشغيل أغنية
  <b>/queue</b> - عرض المقاطع المنتظرة حالياً
  <b>/ping</b> - التحقق من تأخير الشبكة
  <b>/start</b> - بدء المساعد الآلي
  <b>/help</b> - عرض قائمة المساعدة
  <b>/bug</b> - الإبلاغ عن مشكلة أو خطأ
  <b>/position</b> - عرض التوقيت الحالي للمقطع
  <b>/reload</b> - إعادة تحميل بيانات المشرفين أو الذاكرة المؤقتة
  <b>/json</b> - عرض بنية JSON للرسالة
  <b>/sudolist</b> - عرض قائمة المساعدين
  </blockquote>
