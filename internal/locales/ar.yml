  <b>⚠️ بيانات RTMP مفقودة</b>

  <i>يبدو أن <b>بث RTMP</b> نشط في هذه المحادثة، لكنك لم تقدم <b>رابط RTMP</b> المطلوب أو <b>مفتاح البث</b>. بدون هذه البيانات، لا يمكنني بدء تشغيل الموسيقى عبر RTMP.</i>

  <b>الاستخدام:</b> <code>/setrtmp [chat_id] [url+key]</code>

  <i>📌 بمجرد تعيين بيانات RTMP، يمكنك بدء البث.</i>  
