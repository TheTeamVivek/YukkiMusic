  🎙️ <b>कोई सक्रिय ध्वनि वार्तालाप नहीं</b>

  मैं सम्मिलित नहीं हो सकता — कृपया पहले एक ध्वनि वार्तालाप आरम्भ करें।

  <i>पूर्व में ही आरम्भ कर दिया है? अद्यतन करने के लिए /reload का प्रयोग करें।</i>

