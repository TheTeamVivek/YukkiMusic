err_connection_timeout: |
  ⚠️ <b>ध्वनि वार्तालाप सम्पर्क समय-सीमा समाप्त</b>

  टेलीग्राम वर्तमान में ध्वनि वार्तालाप सम्पर्क का उचित उत्तर नहीं दे रहा है।

  <i>यदि यह निरन्तर होता रहता है, तो ध्वनि वार्तालाप समाप्त करें और पुनः आरम्भ करें, फिर पुनः प्रयास करें।</i>

