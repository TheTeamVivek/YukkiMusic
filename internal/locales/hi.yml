supergroup_needed: |
  यह वार्तालाप (परिचय पत्र: <code>{chat_id}</code>) अभी तक एक वृहत समूह (supergroup) नहीं है।
  <b>⚠️ कृपया इस वार्तालाप को वृहत समूह में परिवर्तित करें और फिर मुझे प्रशासक के रूप में जोड़ें।</b>
  
  यदि आप नहीं जानते कि कैसे परिवर्तित करना है, तो इस मार्गदर्शिका का प्रयोग करें:
  🔗 <a href=\"https://te.legra.ph/How-to-Convert-a-Group-to-a-Supergroup-01-02\">समूह को वृहत समूह में कैसे परिवर्तित करें</a>
  
  यदि आपके कोई प्रश्न हैं, तो हमारे सहायता समूह में सम्मिलित हों:
  
