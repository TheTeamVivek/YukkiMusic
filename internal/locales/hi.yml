# Commands help
help_owner: |
  👑 <b>स्वामी आदेश</b>

  <i>विशेषाधिकारियों के प्रबन्धन, प्रणाल्याधीन कोड निष्पादन और सहायक प्रशासन को सुरक्षित रूप से संचालित करने के लिए अनन्य साधन।</i>

  <b>आदेश:</b>
  <blockquote>
  <b>/addsudo</b> - सहायक की विशेषाधिकारी सूची में नवीन उपयोगकर्ता जोड़ें
  <b>/delsudo</b> - सहायक की विशेषाधिकारी सूची से उपयोगकर्ता हटाएँ
  <b>/eval</b> - गो (Go) कोड खण्डों का निष्पादन करें
  <b>/maintenance</b> — सहायक की अनुरक्षण विधा का प्रबन्धन करें
  <b>/restart</b> — सहायक को पुनः आरम्भ करें
  <b>/sh</b> - शैल (shell) आदेश चलाएँ
  </blockquote>

help_sudo: |
  ⚡ <b>विशेषाधिकारी आदेश</b>

  <i>सहायक के व्यवहार प्रबन्धन, प्रदर्शन की निगरानी और डाउनलोड एवं स्वचालन के नियन्त्रण के लिए उन्नत साधन।</i>

  <b>आदेश:</b>
  <blockquote>
  <b>/active</b> - कुल सक्रिय वार्तालाप दिखाता है
  <b>/autoleave</b> - स्वचालित प्रस्थान को बदलें
  <b>/logger</b> - अभिलेखक को सक्षम या अक्षम करें
  <b>/stats</b> - सहायक एवं प्रणाली के आँकड़े प्रदर्शित करें
  <b>/logs</b> - प्रणाली के अभिलेख प्राप्त करें 
  </blockquote>

help_admin: |
  🛠 <b>प्रशासक आदेश</b>

  <i>प्रशासकों के लिए संगीत और पुनः प्रसारण को सुगमता से नियन्त्रित करने के साधन।</i>

  <b>आदेश:</b>
  <blockquote>
  <b>/playmode</b> - संगीत संचालन विधा नियन्त्रित करें
  <b>/speed</b> - चलाने की गति बदलें
  <b>/skip</b> - वर्तमान गीत छोड़ें
  <b>/pause</b> - वर्तमान संगीत को विराम दें
  <b>/resume</b> - विराम दिए गए संगीत को पुनः आरम्भ करें
  <b>/replay</b> - वर्तमान गीत पुनः चलाएँ
  <b>/mute</b> - संगीत निःशब्द करें
  <b>/unmute</b> - संगीत सशब्द करें
  <b>/seek</b> - कुछ क्षण आगे बढ़ाएँ
  <b>/seekback</b> - कुछ क्षण पीछे हटाएँ
  <b>/jump</b> - संगीत में दिए गए समय पर कूदें
  <b>/move</b> - प्रतीक्षा सूची के गीत को अन्य स्थिति पर ले जाएँ
  <b>/clear</b> - प्रतीक्षा सूची से सभी गीत हटाएँ
  <b>/remove</b> - प्रतीक्षा सूची से विशिष्ट संगीत हटाएँ
  <b>/shuffle</b> - प्रतीक्षा सूची के सभी गीतों को यादृच्छिक क्रम में करें
  <b>/loop</b> - आवृत्ति को सक्षम या अक्षम करें
  <b>/stop</b> - संगीत बन्द करें और ध्वनि वार्तालाप छोड़ें
  <b>/nothumb</b> - संगीत सन्देशों में कलाकृति/लघु-चित्र सक्षम या अक्षम करें
  </blockquote>

help_public: |
  🌍 <b>सार्वजनिक आदेश</b>

  <i>गीत चलाने, प्रतीक्षा सूची देखने, विलम्बता जाँचने और त्रुटि सूचना देने की सुविधाएँ।</i>

  <b>आदेश:</b>
  <blockquote>
  <b>/play</b> - गीत चलाएँ
  <b>/queue</b> - वर्तमान में प्रतीक्षा सूची के सभी संगीत देखें
  <b>/ping</b> - सहायक की संजाल विलम्बता जाँचें
  <b>/start</b> - सहायक आरम्भ करें
  <b>/help</b> - सहायता सूची दिखाएँ
  <b>/bug</b> - किसी समस्या या त्रुटि की सूचना दें
  <b>/position</b> - वर्तमान संगीत का समय-चिह्न दिखाएँ
  <b>/reload</b> - प्रशासक या संचित सूचना को पुनः लोड करें
  <b>/json</b> - सन्देश की जे.एस.ओ.एन. संरचना दिखाएँ
  <b>/sudolist</b> - विशेषाधिकारी उपयोगकर्ताओं की सूची देखें
  </blockquote>
  