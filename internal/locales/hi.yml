err_peer_resolve_failed: |
  ⚠️ सहकर्मी सूचना संकल्प में विफल। कृपया कुछ समय पश्चात प्रयास करें या सहायक को पुनः जोड़ें।

err_rtmp_missing_params: |
  <b>⚠️ RTMP विवरण अनुपस्थित</b>

  <i>प्रतीत होता है कि इस वार्तालाप में एक <b>RTMP प्रवाह</b> सक्रिय है, किन्तु आपने आवश्यक
  <b>RTMP यू.आर.एल.</b> या <b>प्रवाह कुञ्जी</b> प्रदान नहीं की है। इनके बिना, मैं RTMP पर संगीत प्रवाह आरम्भ नहीं कर सकता।</i>

  <b>प्रयोग करें:</b> <code>/setrtmp [वार्तालाप_परिचय_पत्र] [यू.आर.एल.+कुञ्जी]</code>

  <i>📌 एक बार RTMP विवरण निर्धारित हो जाने पर, आप प्रवाह आरम्भ कर सकते हैं।</i>  
  <i>➡️ यदि आप RTMP का प्रयोग नहीं करना चाहते, तो इसके स्थान पर सामान्य ध्वनि वार्तालाप का प्रयोग करें।</i>
  
