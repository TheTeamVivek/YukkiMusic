# 🚫 Assistant Restricted / Banned
assistant_restricted_warning: |
  ⚠️ <b>सहायक प्रतिबन्धित</b>

  सहायक {assistant} (परिचय पत्र: <code>{id}</code>) इस वार्तालाप में <b>वर्जित</b> या प्रतिबन्धित कर दिया गया है।
  जब तक यह स्थिति बनी रहेगी, मैं संगीत नहीं चला सकता, प्रतीक्षा सूची का प्रबन्धन नहीं कर सकता, या संगीत संचिकाओं को हटा नहीं सकता।

  <i>संगीत की समस्त सुविधाओं को पुनर्स्थापित करने के लिए सहायक को वर्जित सूची से हटाएँ 🎵</i>

