  • <code>वार्तालाप_परिचय_पत्र</code> - लक्ष्य वार्तालाप/प्रणाल का परिचय पत्र
  • <code>पूर्ण_RTMP_यू.आर.एल.</code> - प्रवाह कुञ्जी के साथ पूर्ण RTMP यू.आर.एल.
  
  <b>📝 उदाहरण:</b>
  <code>/setrtmp -1001234567890 rtmps://dc5-1.rtmp.t.me/s/123:key</code>
  
  <b>🔍 वार्तालाप परिचय पत्र कैसे प्राप्त करें:</b>
  • वार्तालाप से कोई भी सन्देश @userinfobot पर अग्रेषित करें
  • अथवा वार्तालाप में <code>/id</code> आदेश का प्रयोग करें
  
  <b>🔐 सुरक्षा:</b>
  • विन्यास केवल व्यक्तिगत वार्तालाप में कार्य करता है
  • आपको लक्ष्य वार्तालाप में प्रशासक होना चाहिए
  • विवरण सुरक्षित रूप से संचित किए जाते हैं।

