# Commands help
help_owner: |
  👑 <b>Sahip Komutları</b>

  <i>Sudo kullanıcılarını yönetmek, sistem kodu yürütmek ve bot yönetimini güvenli bir şekilde gerçekleştirmek için özel araçlar.</i>

  <b>Komutlar:</b>
  <blockquote>
  <b>/addsudo</b> - Botun sudo listesine yeni bir kullanıcı ekle
  <b>/delsudo</b> - Botun sudo listesinden bir kullanıcı çıkar
  <b>/eval</b> - Go kod parçacıklarını yürüt
  <b>/maintenance</b> — Botun bakım modunu yönet
  <b>/restart</b> — Botu yeniden başlat
  <b>/sh</b> - Kabuk (shell) komutlarını çalıştır
  </blockquote>

help_sudo: |
  ⚡ <b>Sudo Komutları</b>

  <i>Bot davranışını yönetmek, performansı izlemek, günlükleri ve otomasyonu kontrol etmek için gelişmiş araçlar.</i>

  <b>Komutlar:</b>
  <blockquote>
  <b>/active</b> - Toplam aktif sohbetleri gösterir
  <b>/autoleave</b> - Otomatik sohbetten ayrılma özelliğini değiştir
  <b>/logger</b> - Günlüğü etkinleştir veya devre dışı bırak
  <b>/stats</b> - Bot ve sistem istatistiklerini görüntüle
  <b>/logs</b> - Sistem günlüklerini al 
  </blockquote>

help_admin: |
  🛠 <b>Yönetici Komutları</b>

  <i>Yöneticilerin oynatmayı kolayca yönetmesi için müzik ve oynatma kontrol araçları.</i>

  <b>Komutlar:</b>
  <blockquote>
  <b>/playmode</b> - /play komutunu kimin kullanacağını kontrol et
  <b>/cplay</b> - Bağlı kanalın sesli sohbetinde oynat
  <b>/adminmode</b> - Yönetici komutlarını kimin kullanacağını kontrol et
  <b>/cmddelete</b> - Bot komutlarının otomatik silinmesini aç/kapat
  <b>/settings</b> - Sohbet ayarlarını yapılandır
  <b>/speed</b> - Oynatma hızını değiştir
  <b>/skip</b> - Mevcut şarkıyı atla
  <b>/pause</b> - Mevcut oynatmayı duraklat
  <b>/resume</b> - Duraklatılan oynatmayı devam ettir
  <b>/replay</b> - Mevcut şarkıyı yeniden oynat
  <b>/mute</b> - Oynatmayı sessize al
  <b>/unmute</b> - Oynatma sesini aç
  <b>/seek</b> - Birkaç saniye ileri sar
  <b>/seekback</b> - Birkaç saniye geri sar
  <b>/jump</b> - Parçada belirli bir zamana atla
  <b>/move</b> - Sıradaki bir parçayı başka bir konuma taşı
  <b>/clear</b> - Tüm şarkıları sıradan temizle
  <b>/remove</b> - Sıradan belirli bir parçayı çıkar
  <b>/shuffle</b> - Sıradaki tüm parçaları karıştır
  <b>/loop</b> - Döngüyü etkinleştir veya devre dışı bırak
  <b>/stop</b> - Oynatmayı durdur ve sesli sohbetten ayrıl
  <b>/nothumb</b> - Oynatma mesajlarında kapak resmi/küçük resmi etkinleştir veya devre dışı bırak
  </blockquote>
  
help_public: |
  🌍 <b>Genel Komutlar</b>

  <i>Şarkı çalma, sıraları görüntüleme, gecikme kontrolü ve hata bildirme özellikleri.</i>

  <b>Komutlar:</b>
  <blockquote>
  <b>/play</b> - Bir şarkı çal
  <b>/queue</b> - Şu an sırada olan tüm parçaları görüntüle
  <b>/ping</b> - Botun ağ gecikmesini kontrol et
  <b>/start</b> - Botu başlat
  <b>/help</b> - Yardım menüsünü göster
  <b>/bug</b> - Bir sorun veya hata bildir
  <b>/position</b> - Mevcut parçanın zaman damgasını göster
  <b>/reload</b> - Yönetici veya önbellek verilerini yenile
  <b>/json</b> - Mesajın JSON yapısını göster
  <b>/sudolist</b> - Sudo kullanıcı listesini görüntüle
  </blockquote>
