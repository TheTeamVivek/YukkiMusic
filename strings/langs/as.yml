  <b>{PLAY_PLAYLIST_COMMAND}</b> - আপোনাৰ প্লেলিষ্ট ভিডিঅ’ ৰূপে বজাব আৰম্ভ কৰক

BLIST_HELPER: |
  <b>✧ {BLACKLISTCHAT_COMMAND}</b> [চেট ID] - সংগীত বট ব্যৱহাৰৰ পৰা কোনো চেটক ক’লা তালিকাভুক্ত কৰক।
  <b>✧ {WHITELISTCHAT_COMMAND}</b> [চেট ID] - ক’লা তালিকাভুক্ত চেটক সংগীত বট ব্যৱহাৰৰ অনুমতি কৰক।
  <b>✧ {BLACKLISTEDCHAT_COMMAND}</b> - আটাইতকৈ বাধা প্ৰাপ্ত চেটসমূহ পৰীক্ষা কৰক।
  <b>✧ {BLOCK_COMMAND}</b> [ব্যৱহাৰকাৰীৰ নাম বা ব্যৱহাৰকাৰীক প্ৰতিক্ৰিয়া কৰক] - কোনো ব্যৱহাৰকাৰীৰ বটৰ আদেশ ব্যৱহাৰ কৰাৰ পৰা বাধা দিয়ক।
  <b>✧ {UNBLOCK_COMMAND}</b> [ব্যৱহাৰকাৰীৰ নাম বা ব্যৱহাৰকাৰীক প্ৰতিক্ৰিয়া কৰক] - কোনো ব্যৱহাৰকাৰীক বটৰ ক’লা তালিকাৰ পৰা আঁতৰাওক।
  <b>✧ {BLOCKED_COMMAND}</b> - বাধা প্ৰাপ্ত ব্যৱহাৰকাৰীৰ তালিকা পৰীক্ষা কৰক।
  <b>✧ {GBAN_COMMAND}</b> [ব্যৱহাৰকাৰীৰ নাম বা ব্যৱহাৰকাৰীক প্ৰতিক্ৰিয়া কৰক] - সকলো সেৱা কৰা চেটৰ পৰা কোনো ব্যৱহাৰকাৰীক বাধা দিয়ক আৰু তেওঁলোকক বট ব্যৱহাৰৰ পৰা বাধা দিয়ক।
  <b>✧ {UNGBAN_COMMAND}</b> [ব্যৱহাৰকাৰীৰ নাম বা ব্যৱহাৰকাৰীক প্ৰতিক্ৰিয়া কৰক] - ব্যৱহাৰকাৰীক গ্লোবেল বাধাৰ পৰা মুক্ত কৰক আৰু বট ব্যৱহাৰৰ অনুমতি দিয়ক।
  <b>✧ {GBANNED_COMMAND}</b> - গ্লোবেল বাধা প্ৰাপ্ত ব্যৱহাৰকাৰীৰ তালিকা পৰীক্ষা কৰক।

