# Helpers

AUTH_HELPER: |
  <b>অথৰাইজড ব্যৱহাৰকাৰীসকলে আপোনাৰ চেটত প্ৰশাসনিক অধিকাৰ নাথাকিলেও প্ৰশাসনিক আদেশ ব্যৱহাৰ কৰিব পাৰে।</b>
  <b>✧ {AUTH_COMMAND}</b> [ব্যৱহাৰকাৰীৰ নাম] - গ্ৰুপৰ AUTH LIST ত এজন ব্যৱহাৰকাৰীক যোগ কৰক।
  <b>✧ {UNAUTH_COMMAND}</b> [ব্যৱহাৰকাৰীৰ নাম] - গ্ৰুপৰ AUTH LIST ৰ পৰা এজন ব্যৱহাৰকাৰীক আঁতৰাওক।
  <b>✧ {AUTHUSERS_COMMAND}</b> - গ্ৰুপৰ AUTH LIST চাওক।

ADMIN_HELPER: |
  <b>c মানে চেনেল প্লে</b>
  <b>✧ {PAUSE_COMMAND}</b> - বজাই থকা সংগীত ৰখাওক।
  <b>✧ {RESUME_COMMAND}</b> - ৰখোৱা সংগীত পুনৰ আৰম্ভ কৰক।
  <b>✧ {MUTE_COMMAND}</b> - বজাই থকা সংগীতৰ শব্দ নীৰৱ কৰক।
  <b>✧ {UNMUTE_COMMAND}</b> - নীৰৱ কৰা সংগীতৰ শব্দ পুনৰ আৰম্ভ কৰক।
  <b>✧ {SKIP_COMMAND}</b> - বৰ্তমান বজাই থকা সংগীতটো আগলৈ অনাওক।
  <b>✧ {STOP_COMMAND}</b> - বজাই থকা সংগীতটো বন্ধ কৰক।
  <b>✧ {SHUFFLE_COMMAND}</b> - অপেক্ষা কৰা ছাৰীৰ সংগীতবোৰৰ তালিকা অনিয়মিতভাৱে মিলাওক।
  <b>✧ {SEEK_COMMAND}</b> - সংগীতটো আগবাঢ়ি চাওক।
  <b>✧ {SEEK_BACK_COMMAND}</b> - সংগীতটো পিছলৈ ঘূৰাই আপোনাৰ সময়লৈ চাওক।
  <b>✧ {REBOOT_COMMAND}</b> - আপোনাৰ চেটৰ বাবে বট পুনৰাৰম্ভ কৰক।
  <b>✧ {SKIP_COMMAND}</b> [নাম্বাৰ (উদাহৰণ: 3)] - নিৰ্দিষ্ট নাম্বাৰলৈ সংগীতটো আগলৈ অনাওক। উদাহৰণ: <b>/skip 3</b> তৃতীয় সংগীতটোলৈ আগবাঢ়িব আৰু ছাৰীৰ 1 আৰু 2 উপেক্ষা কৰিব।
  <b>✧ {LOOP_COMMAND}</b> [enable/disable] বা [1-10ৰ ভিতৰত কোনো নাম্বাৰ] - সক্ৰিয় কৰোঁতে, বটে বৰ্তমান সংগীতটো ভইচ চেটত 1-10 বাৰৰ বাবে পুনৰাবৃত্তি কৰিব। নিৰ্ধাৰিত পুনৰাবৃত্তিৰ মান হৈছে 10।

ACTIVE_HELPER: |
  <b>✧ {ACTIVEVC_COMMAND}</b> - বটৰ ওপৰত সক্ৰিয় ভইচ চেটবোৰ পৰীক্ষা কৰক।
  <b>✧ {ACTIVEVIDEO_COMMAND}</b> - বটৰ ওপৰত সক্ৰিয় ভইচ আৰু ভিডিঅ’ কলবোৰ পৰীক্ষা কৰক।
  <b>✧ {AC_COMMAND}</b> - বটৰ ওপৰত সক্ৰিয় ভিডিঅ’ কলবোৰ পৰীক্ষা কৰক।
  <b>✧ {STATS_COMMAND}</b> - বটৰ পৰিসংখ্যা পৰীক্ষা কৰক।

PLAY_HELPER: |
  <b>✧ {PLAY_COMMAND}</b> - বটে আপোনাৰ দিয়া প্ৰশ্নৰ ওপৰত ভইচ চেটত সংগীত বজাব বা লাইভ লিংকসমূহ চেটত প্ৰসাৰণ কৰিবলৈ আৰম্ভ কৰিব।
  <b>✧ {PLAYMODE_COMMAND}</b> - ফ’ৰচ প্লে, বৰ্তমান বজাই থকা সংগীতটো বন্ধ কৰি বিচৰা সংগীতটো তৎক্ষণাত বজাব।
  <b>✧ {CHANNELPLAY_COMMAND}</b> - চেনেলক এখন গোটৰ সৈতে সংযোগ কৰক আৰু আপোনাৰ গোটৰ পৰা চেনেলৰ ভইচ চেটত সংগীত প্ৰসাৰণ কৰক।
  <b>✧ {STREAM_COMMAND}</b> - এটা URL প্ৰসাৰণ কৰক যাক আপুনি ভাবিব যে /play দ্বাৰা চলাই নাপায়।

GCAST_HELPER: |
  <b>{BROADCAST_COMMAND} [মেছেজ বা কোনো মেছেজত প্ৰতিক্ৰিয়া]</b> » বটৰ দ্বাৰা পূৰ্বতে সেৱা কৰা চেটসমূহত মেছেজ প্ৰচাৰ কৰক
  <u>প্ৰচাৰ মড:</u>
  <b><code>-pin</code></b> » প্ৰচাৰ কৰা মেছেজ সেৱা কৰা চেটসমূহত পিন কৰক
  <b><code>-pinloud</code></b> » প্ৰচাৰ কৰা মেছেজ সেৱা কৰা চেটসমূহত পিন কৰক আৰু সদস্যসকলক নিৰ্দেশনা প্ৰেৰণ কৰক
  <b><code>-user</code></b> » বটে আৰম্ভ কৰা ব্যৱহাৰকাৰীসকললৈ মেছেজ প্ৰচাৰ কৰক [আপুনি `-pin` বা `-pinloud` যোগ কৰি মেছেজ পিন কৰিব পাৰে]
  <b><code>-assistant</code></b> » আপোনাৰ মেছেজ বটৰ সকলো সহায়কৰ দ্বাৰা প্ৰচাৰ কৰক
  <b><code>-nobot</code></b> » নিশ্চিত কৰে যে **বট** মেছেজটো প্ৰচাৰ নকৰে [আপুনি মেছেজটো গোটসমূহলৈ প্ৰচাৰ কৰিবলৈ নাছাহিলে সুবিধাজনক]
  > <b>উদাহৰণ:</b> <code>{BROADCAST_COMMAND[0]} -user -assistant -pin পৰীক্ষা প্ৰচাৰ</code>

BOT_HELPER: |
  <b>★ {GSTATS_COMMAND}</b> - শীৰ্ষ 10 সংগীত গ্লোবেল পৰিসংখ্যা, বটৰ শীৰ্ষ 10 ব্যৱহাৰকাৰী, বটৰ শীৰ্ষ 10 চেট, এখন চেটত শীৰ্ষ 10 খেলা, ইত্যাদি।
  <b>★ {SUDOUSERS_COMMAND}</b> - বটৰ সুড’ ব্যৱহাৰকাৰী পৰীক্ষা কৰক।
  <b>★ {LYRICS_COMMAND} [সংগীতৰ নাম]</b> - নিৰ্দিষ্ট সংগীতৰ বাবে ৱেবে গীতৰ শব্দ বিচাৰ কৰক।
  <b>★ {SONG_COMMAND} [সংগীতৰ নাম] বা [YouTube লিংক]</b> - YouTube ৰ পৰা সংগীত ম’প 3 বা ম’প 4 ফৰ্মেটত ডাউনল’ড কৰক।
  <b>★ {QUEUE_COMMAND}</b> - সংগীতৰ অপেক্ষাৰ তালিকা চাওক।
  <u><b>⚡️প্ৰাইভেট বট:</b></u>
  <b>✧ {AUTHORIZE_COMMAND} [CHAT_ID]</b> - এখন চেটৰ বাবে বট ব্যৱহাৰৰ অনুমতি কৰক।
  <b>✧ {UNAUTHORIZE_COMMAND} [CHAT_ID]</b> - এখন চেটৰ পৰা বট ব্যৱহাৰ নিষিদ্ধ কৰক।
  <b>✧ {AUTHORIZED_COMMAND}</b> - আপোনাৰ বট ব্যৱহাৰৰ অনুমতি প্ৰাপ্ত চেটসমূহ চাওক।

