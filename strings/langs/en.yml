# Helpers

AUTH_HELPER: |
  <b>Auth Users can use Admin commands without admin rights in your chat.</b>
  
  <b>вң§ {AUTH_COMMAND}</b> [Username] - Add a user to AUTH LIST of the Group.
  
  <b>вң§ {UNAUTH_COMMAND}</b> [Username] - Remove a user from AUTH LIST of the group.
  
  <b>вң§ {AUTHUSERS_COMMAND}</b> - Check AUTH LIST of the Group.

ADMIN_HELPER: |
  <b>c stands for channel play</b>
  
  <b>вң§ {PAUSE_COMMAND}</b> - Pause the playing music.
  <b>вң§ {RESUME_COMMAND}</b> - Resume the paused music.
  <b>вң§ {MUTE_COMMAND}</b> - Mute the playing music.
  <b>вң§ {UNMUTE_COMMAND}</b> - Unmute the muted music.
  <b>вң§ {SKIP_COMMAND}</b> - Skip the current playing music.
  <b>вң§ {STOP_COMMAND}</b> - Stop the playing music.
  <b>вң§ {SHUFFLE_COMMAND}</b> - Randomly shuffle the queued playlist/songs.
  <b>вң§ {SEEK_COMMAND}</b> - Forward seek the music.
  <b>вң§ {SEEK_BACK_COMMAND}</b> - Backward seek the music to your duration.
  <b>вң§ {REBOOT_COMMAND}</b> - Reboot bot for your chat.
  
  <b>вң§ {SKIP_COMMAND}</b> [Number (Example: 3)] - Skip music to a specific number. Example: <b>/skip 3</b> will skip to the third queued music and will ignore 1 and 2 in the queue.
  
  <b>вң§ {LOOP_COMMAND}</b> [Enable/Disable] or [Number between 1-10] - When activated, the bot will loop the current music 1-10 times in voice chat. Default loop value is 10 times.

ACTIVE_HELPER: |
  <b>вң§ {ACTIVEVC_COMMAND}</b> - Check active voice chats on the bot.
  
  <b>вң§ {ACTIVEVIDEO_COMMAND}</b> - Check active voice and video calls on the bot.
  
  <b>вң§ {AC_COMMAND}</b> - Check active video calls on the bot.
  
  <b>вң§ {STATS_COMMAND}</b> - Check bot stats.

PLAY_HELPER: |
  <b>вң§ {PLAY_COMMAND}</b> - Bot will start playing your given query on voice chat or stream live links on voice chats.
  
  <b>вң§ {PLAYMODE_COMMAND}</b> - Force Play stops the current playing track on voice chat and starts playing the searched track instantly without disturbing/clearing the queue.
  
  <b>вң§ {CHANNELPLAY_COMMAND}</b> - Connect channel to a group and stream music on channel's voice chat from your group.
  
  <b>вң§ {STREAM_COMMAND}</b> - Stream a URL that you believe is direct or m3u8 that can't be played by /play.

GCAST_HELPER: |
  <b>{BROADCAST_COMMAND} [Message or Reply to any message]</b> В» Broadcast a message to served chats of bot
  <u>Broadcasting Modes:</u>
  
  <b><code>-pin</code></b> В» Pins your broadcasted message in served chats
  
  <b><code>-pinloud</code></b> В» Pins your broadcasted message in served chats and sends notification to the members
  
  <b><code>-user</code></b> В» Broadcast the message to users who have started your bot [You can also pin the message by adding `-pin` or `-pinloud`]
  
  <b><code>-assistant</code></b> В» Broadcast your message through all assistants of the bot
  
  <b><code>-nobot</code></b> В» Ensures that the **bot** doesn't broadcast the message [Useful when you don't want to broadcast the message to groups]
  
  > <b>Example:</b> <code>{BROADCAST_COMMAND[0]} -user -assistant -pin Testing broadcast</code>

BOT_HELPER: |
  <b>вҳ… {GSTATS_COMMAND}</b> - Get Top 10 Tracks Global Stats, Top 10 Users of Bot, Top 10 Chats on Bot, Top 10 Played in a chat, etc.
  
  <b>вҳ… {SUDOUSERS_COMMAND}</b> - Check Sudo users of the bot.
  
  <b>вҳ… {LYRICS_COMMAND} [Music Name]</b> - Search lyrics for the particular music on the web.
  
  <b>вҳ… {SONG_COMMAND} [Track Name] or [YT Link]</b> - Download any track from YouTube in MP3 or MP4 formats.
  
  <b>вҳ… {QUEUE_COMMAND}</b> - Check the queue list of music.
  
  <u><b>вҡЎпёҸPrivate Bot:</b></u>
  
  <b>вң§ {AUTHORIZE_COMMAND} [CHAT_ID]</b> - Allow a chat to use your bot.
  
  <b>вң§ {UNAUTHORIZE_COMMAND} [CHAT_ID]</b> - Disallow a chat from using your bot.
  
  <b>вң§ {AUTHORIZED_COMMAND}</b> - Check all allowed chats of your bot.

PLIST_HELPER: |
  <b>{PLAYLIST_COMMAND}</b> - Check your whole playlist on the bot server
  
  <b>{DELETE_PLAYLIST_COMMAND}</b> - Delete any song from your saved playlist
  
  <b>{PLAY_PLAYLIST_COMMAND}</b> - Start playing your saved playlist in **audio**
  
  <b>{PLAY_PLAYLIST_COMMAND}</b> - Start playing your playlist in **video**

BLIST_HELPER: |
  <b>вң§ {BLACKLISTCHAT_COMMAND}</b> [chat ID] - Blacklist any chat from using the Music Bot.
  <b>вң§ {WHITELISTCHAT_COMMAND}</b> [chat ID] - Whitelist any blacklisted chat from using the Music Bot.
  <b>вң§ {BLACKLISTEDCHAT_COMMAND}</b> - Check all blocked chats.
  
  <b>вң§ {BLOCK_COMMAND}</b> [Username or reply to a user] - Prevents a user from using bot commands.
  <b>вң§ {UNBLOCK_COMMAND}</b> [Username or reply to a user] - Remove a user from the bot's blocked list.
  <b>вң§ {BLOCKED_COMMAND}</b> - Check the list of blocked users.
  
  <b>вң§ {GBAN_COMMAND}</b> [Username or reply to a user] - Gban a user from all served chats and stop them from using your bot.
  <b>вң§ {UNGBAN_COMMAND}</b> [Username or reply to a user] - Remove a user from the bot's gban list and allow them to use your bot.
  <b>вң§ {GBANNED_COMMAND}</b> - Check the list of gban users.

DEV_HELPER: |
  <b><u>Add and remove sudoers:</u></b>
  
  <b>{ADDSUDO_COMMAND} [Username or reply to a user] - Add sudo in your bot</b>
  <b>{DELSUDO_COMMAND} [Username or userid or reply to a user] - Remove from bot sudoers</b>
  <b>{SUDOUSERS_COMMAND} - Get a list of all sudoers</b>
  
  <b><u>Heroku:</u></b>
  
  <b>{USAGE_COMMAND}</b> - Dyno usage
  <b>{GETVAR_COMMAND} [Var Name]</b> - Get a config var from vars
  <b>{DELVAR_COMMAND} [Var Name]</b> - Delete a var from vars
  <b>{SETVAR_COMMAND} [Var Name] [Value]</b> - Add or update a var. Separate var and its value with a space
  
  <b><u>Bot command:</u></b>
  
  <b>{RESTART_COMMAND}</b> - Restart the bot (SUDOERS only)
  <b>{UPDATE_COMMAND}</b> - Update the bot
  <b>{SPEEDTEST_COMMAND}</b> - Check server speeds
  <b>{MAINTENANCE_COMMAND} [enable / disable]</b> - Toggle bot maintenance mode
  <b>{LOGGER_COMMAND} [enable / disable]</b> - Toggle bot logging of searched queries to log group
  <b>{GETLOG_COMMAND} [Number of lines]</b> - Get logs from server
  <b>{AUTOEND_COMMAND} [enable / disable]</b> - Automatically end the stream after 30s if no one is listening to songs

